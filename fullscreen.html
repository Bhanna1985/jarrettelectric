<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="viewer"></div>

<script>
const urlParams = new URLSearchParams(window.location.search)
const concept = urlParams.get("concept")
const imgNum = urlParams.get("img")

const viewer = document.getElementById("viewer")

const container = document.createElement("div")
container.style.position = "relative"
container.style.width = "1200px"
container.style.height = "800px"
container.style.margin = "auto"
container.style.backgroundImage = "url('assets/fullscreen_template.png')"
container.style.backgroundSize = "contain"
container.style.backgroundRepeat = "no-repeat"

const img = document.createElement("img")
img.src = "Concepts/Concept_" + concept + "/images/Concept_" + concept + "_" + imgNum + ".png"
img.style.position = "absolute"
img.style.top = "150px"
img.style.left = "200px"
img.style.width = "800px"
img.style.height = "500px"
img.style.objectFit = "contain"

viewer.appendChild(container)
viewer.appendChild(img)
</script>

</body>
</html>
