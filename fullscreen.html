<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fullscreen View</title>
<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
}

.container{
position:relative;
width:1200px;
}

.template{
width:100%;
display:block;
}

.imageZone{
position:absolute;
top:350px;
left:200px;
width:800px;
height:600px;
}

.backButton{
position:absolute;
top:250px;
left:450px;
width:300px;
height:80px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<img src="assets/Full_View_Template.png" class="template">

<!-- BACK BUTTON -->
<div class="backButton"></div>

<!-- MAIN IMAGE AREA -->
<div class="imageZone"></div>

</div>

</body>
</html>
