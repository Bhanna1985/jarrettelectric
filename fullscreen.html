<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fullscreen View</title>
<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
}

.container{
position:relative;
width:1200px;
}

.template{
width:100%;
display:block;
}

/* MAIN SCROLLABLE CONTENT AREA */
.contentZone{
position:absolute;
top:360px;
left:100px;
width:1000px;
height:700px;
}

/* NAV BUTTON ZONES */
.backConcept{
position:absolute;
top:240px;
left:60px;
width:220px;
height:80px;
cursor:pointer;
}

.backSelector{
position:absolute;
top:240px;
left:330px;
width:260px;
height:80px;
cursor:pointer;
}

.nextPage{
position:absolute;
top:240px;
left:650px;
width:260px;
height:80px;
cursor:pointer;
}

.nextConcept{
position:absolute;
top:240px;
left:950px;
width:220px;
height:80px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<img src="assets/Full_View_Template.png" class="template">

<!-- BUTTON OVERLAYS -->
<div class="backConcept"></div>
<div class="backSelector"></div>
<div class="nextPage"></div>
<div class="nextConcept"></div>

<!-- MAIN CONTENT AREA -->
<div class="contentZone"></div>

</div>

</body>
</html>
