<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Concept Selector</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="page">

  <div class="title">Jarrett Electric</div>
  <div class="caption">Concept Selection</div>

  <div class="dividerRow">
    <img src="assets/Divider.png" class="divider">
  </div>

  <div class="grid">

    <div class="tile">
      <div class="preview"></div>
      <div class="label">Concept 001</div>
    </div>

    <div class="tile">
      <div class="preview"></div>
      <div class="label">Concept 002</div>
    </div>

    <div class="tile">
      <div class="preview"></div>
      <div class="label">Concept 003</div>
    </div>

    <div class="tile">
      <div class="preview"><div class="soon">Coming Soon</div></div>
      <div class="label">Concept 004</div>
    </div>

    <div class="tile">
      <div class="preview"><div class="soon">Coming Soon</div></div>
      <div class="label">Concept 005</div>
    </div>

    <div class="tile">
      <div class="preview"><div class="soon">Coming Soon</div></div>
      <div class="label">Concept 006</div>
    </div>

  </div>

</div>

</body>
</html>
