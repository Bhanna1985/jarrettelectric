<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarrett Electric Selector</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:black;
display:flex;
justify-content:center;
padding:40px;
font-family:Arial, sans-serif;
color:white;
}

/* GRID */
#grid{
display:grid;
grid-template-columns:repeat(4, 200px);
gap:40px;
}

/* TILE */
.tile{
text-align:center;
cursor:pointer;
}

/* STAGE */
.stage{
position:relative;
width:200px;
height:200px;
background:black;
}

/* EXACT SCALED INNER IMAGE AREAS FROM 360x540 → 200x200 */
.slot{
position:absolute;
width:82px;
height:82px;
object-fit:cover;
object-position:center center;
display:block;
}

/* LOCKED POSITIONS — PROPORTIONAL TO CANVA */
.s1{left:11px; top:11px;}
.s2{left:107px; top:11px;}
.s3{left:11px; top:96px;}
.s4{left:107px; top:96px;}
.s5{left:11px; top:181px;}
.s6{left:107px; top:181px;}

/* TEMPLATE */
.overlay{
position:absolute;
left:0;
top:0;
width:200px;
height:200px;
z-index:10;
pointer-events:none;
}

.label{
margin-top:10px;
font-size:14px;
}
</style>
</head>
<body>

<div id="grid"></div>

<script>
const grid=document.getElementById("grid");

/* BUILD FROM REAL DATA ONLY */
for(let c=1;c<=8;c++){

const concept=String(c).padStart(3,"0");
const base="./Concepts/Concept_"+concept+"/images/";

const tile=document.createElement("div");
tile.className="tile";
tile.onclick=()=>window.location.href="preview.html?concept="+concept;

const stage=document.createElement("div");
stage.className="stage";

/* STRICT LOAD — NO EMPTY BOXES */
for(let i=1;i<=6;i++){
const n=String(i).padStart(2,"0");
const path=base+"Concept_"+concept+"_"+n+".png";

const img=new Image();
img.className="slot s"+i;

img.onload=function(){
img.src=path;
stage.appendChild(img);
};

img.onerror=function(){
/* DO NOT RENDER BROKEN IMAGE */
};

img.src=path;
}

/* SINGLE TEMPLATE */
const overlay=document.createElement("img");
overlay.className="overlay";
overlay.src="./assets/preview_template.png";
stage.appendChild(overlay);

const label=document.createElement("div");
label.className="label";
label.textContent="Concept "+concept;

tile.appendChild(stage);
tile.appendChild(label);
grid.appendChild(tile);
}
</script>

</body>
</html>
