<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Concept Selector</title>
<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
}

.container{
position:relative;
width:1200px;
}

.template{
width:100%;
display:block;
}

.tile{
position:absolute;
width:200px;
height:200px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<img src="assets/Selector_Template.png" class="template">

<!-- TOP ROW -->
<div class="tile" style="top:300px; left:80px;"></div>
<div class="tile" style="top:300px; left:360px;"></div>
<div class="tile" style="top:300px; left:640px;"></div>
<div class="tile" style="top:300px; left:920px;"></div>

<!-- BOTTOM ROW -->
<div class="tile" style="top:620px; left:80px;"></div>
<div class="tile" style="top:620px; left:360px;"></div>
<div class="tile" style="top:620px; left:640px;"></div>
<div class="tile" style="top:620px; left:920px;"></div>

</div>

</body>
</html>
