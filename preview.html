<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarrett Electric Preview</title>
<meta name="viewport" content="width=360, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:black;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}
#stage{
position:relative;
width:360px;
height:540px;
}
.slot{
position:absolute;
width:148px;
height:148px;
object-fit:cover;
object-position:center center;
}
#overlay{
position:absolute;
left:0;
top:0;
width:360px;
height:540px;
pointer-events:none;
z-index:10;
}
</style>
</head>
<body>

<div id="stage">
<img id="img1" class="slot" style="left:19px;top:20px;">
<img id="img2" class="slot" style="left:193px;top:20px;">
<img id="img3" class="slot" style="left:19px;top:194px;">
<img id="img4" class="slot" style="left:193px;top:194px;">
<img id="img5" class="slot" style="left:19px;top:368px;">
<img id="img6" class="slot" style="left:193px;top:368px;">

<img id="overlay" src="assets/preview_template.png" alt="">
</div>

<script>
(function(){
const params=new URLSearchParams(window.location.search);
let concept=params.get("concept")||"001";
concept=concept.replace(/\D/g,"").padStart(3,"0");

const base="Concepts/Concept_"+concept+"/images/";

for(let i=1;i<=6;i++){
const n=String(i).padStart(2,"0");
const el=document.getElementById("img"+i);
el.src=base+"Concept_"+concept+"_"+n+".png";
}
})();
</script>

</body>
</html>
