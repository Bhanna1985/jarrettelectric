<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="preview"></div>

<script>
const urlParams = new URLSearchParams(window.location.search)
const concept = urlParams.get("concept")

const preview = document.getElementById("preview")

const container = document.createElement("div")
container.style.position = "relative"
container.style.width = "1200px"
container.style.height = "800px"
container.style.margin = "auto"
container.style.backgroundImage = "url('assets/preview_template.png')"
container.style.backgroundSize = "contain"
container.style.backgroundRepeat = "no-repeat"

const slots = [
  { top: 200, left: 300 },
  { top: 200, left: 500 },
  { top: 350, left: 300 },
  { top: 350, left: 500 },
  { top: 500, left: 300 },
  { top: 500, left: 500 }
]

slots.forEach((pos, index) => {
  const img = document.createElement("img")
  const num = String(index + 1).padStart(2, '0')

  img.src = "Concepts/Concept_" + concept + "/images/Concept_" + concept + "_" + num + ".png"
  img.style.position = "absolute"
  img.style.top = pos.top + "px"
  img.style.left = pos.left + "px"
  img.style.width = "150px"
  img.style.height = "100px"
  img.style.objectFit = "cover"

  img.onclick = function() {
    window.location.href = "fullscreen.html?concept=" + concept + "&img=" + num
  }

  preview.appendChild(img)
})

preview.appendChild(container)
</script>

</body>
</html>
