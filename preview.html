<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Concept Preview</title>
<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
}

.container{
position:relative;
width:1200px;
}

svg{
width:100%;
display:block;
}

.zone{
position:absolute;
width:300px;
height:300px;
cursor:pointer;
}

.backButton{
position:absolute;
top:230px;
left:450px;
width:300px;
height:80px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div id="svgContainer"></div>

<div class="backButton"></div>

<div class="zone" style="top:360px; left:120px;"></div>
<div class="zone" style="top:360px; left:680px;"></div>

<div class="zone" style="top:740px; left:120px;"></div>
<div class="zone" style="top:740px; left:680px;"></div>

<div class="zone" style="top:1120px; left:120px;"></div>
<div class="zone" style="top:1120px; left:680px;"></div>

</div>

<script>
fetch('assets/Preview.svg')
.then(res => res.text())
.then(svg => {
document.getElementById('svgContainer').innerHTML = svg;

const numbers = document.querySelectorAll('#conceptNumber');
numbers.forEach((el, index) => {
el.textContent = index + 1;
});
});
</script>

</body>
</html>
